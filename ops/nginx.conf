server {
  listen 80;
  server_name x1pays.xyz api.x1pays.xyz facilitator.x1pays.xyz;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name api.x1pays.xyz;

  # SSL certificates (configure with Certbot or Cloudflare)
  # ssl_certificate /etc/letsencrypt/live/api.x1pays.xyz/fullchain.pem;
  # ssl_certificate_key /etc/letsencrypt/live/api.x1pays.xyz/privkey.pem;

  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 443 ssl http2;
  server_name facilitator.x1pays.xyz;

  # SSL certificates
  # ssl_certificate /etc/letsencrypt/live/facilitator.x1pays.xyz/fullchain.pem;
  # ssl_certificate_key /etc/letsencrypt/live/facilitator.x1pays.xyz/privkey.pem;

  location / {
    proxy_pass http://127.0.0.1:4000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

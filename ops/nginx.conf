server {
  listen 80;
  server_name x1pays.xyz www.x1pays.xyz api.x1pays.xyz facilitator.x1pays.xyz;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name api.x1pays.xyz;

  # SSL certificates (configure with Certbot or Cloudflare)
  # ssl_certificate /etc/letsencrypt/live/api.x1pays.xyz/fullchain.pem;
  # ssl_certificate_key /etc/letsencrypt/live/api.x1pays.xyz/privkey.pem;

  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 443 ssl http2;
  server_name facilitator.x1pays.xyz;

  # SSL certificates
  # ssl_certificate /etc/letsencrypt/live/facilitator.x1pays.xyz/fullchain.pem;
  # ssl_certificate_key /etc/letsencrypt/live/facilitator.x1pays.xyz/privkey.pem;

  location / {
    proxy_pass http://127.0.0.1:4000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 443 ssl http2;
  server_name x1pays.xyz www.x1pays.xyz;

  # SSL certificates
  # ssl_certificate /etc/letsencrypt/live/x1pays.xyz/fullchain.pem;
  # ssl_certificate_key /etc/letsencrypt/live/x1pays.xyz/privkey.pem;

  root /var/www/x1pays/packages/website/dist;
  index index.html;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json;

  # Cache static assets
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # SPA fallback - serve index.html for all routes
  location / {
    try_files $uri $uri/ /index.html;
  }
}
